<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: black;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            text-align: center;
        }
        h1 {
            color: #b74b4b;
            font-size: 4rem;
        }
    </style>
</head>
<body>
    <h1 id="typing-h1"></h1>
    <script>
        const typingH1 = document.getElementById('typing-h1');
        const text = "Explore my journey in technology, innovation, and creativity.";
        let index = 0;

        function typeH1() {
            if (index < text.length) {
                typingH1.textContent += text.charAt(index);
                index++;
                setTimeout(typeH1, 100); // Adjust typing speed here
            }
        }

        typeH1();

        // Redirect to the main page after 5 seconds
        setTimeout(() => {
            window.location.href = "index.html";
        }, 5000);
    </script>
</body>
</html>
